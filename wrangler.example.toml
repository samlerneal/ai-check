name = "ai-check"
main = "worker.js"
compatibility_date = "2026-07-03"
workers_dev = true

[vars]
DNS_PROBE_DOMAIN = "dns-probe.example.com"

[[kv_namespaces]]
binding = "DNS_EVENTS"
id = "your_kv_namespace_id"

[[routes]]
pattern = "ai-check.example.com"
custom_domain = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/v1/probes/*"]
not_found_handling = "404-page"
